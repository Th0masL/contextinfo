name: printenv

# Diagnostic workflow: dump the runner environment, the raw git context (commit
# subject, parent count / merge, committer), and what contextinfo detects from
# them — for as many event types as practical, so we can see which GITHUB_*/CI
# variables each event populates and confirm the binary captures the right ones
# (the raw git block sits next to contextinfo's output so they can be compared).
#
# GitHub has no "all events" wildcard, so the relevant events are listed
# explicitly; add more as needed. Use "Run workflow" (workflow_dispatch) in the
# Actions tab to trigger it on demand. This is a diagnostic and consumes CI
# minutes on every listed event — trim the list (or delete the file) once you've
# gathered what you need.
on:
  push:
  workflow_dispatch:
  release:
    types: [published]
  schedule:
    - cron: "0 6 * * 1" # weekly, to capture the scheduled-event environment

permissions:
  contents: read

jobs:
  printenv:
    runs-on: ubuntu-latest
    steps:
      - name: Event name
        run: echo "event_name = ${{ github.event_name }}"
      # printenv needs no checkout. The GIT prefix covers GITHUB_*, GIT_* (git's
      # own vars) and GITLAB_*. Drop anything that looks sensitive (GitHub also
      # masks registered secrets in logs).
      - name: Environment variables
        run: printenv | sort | grep -E '^(GIT|RUNNER_|CI)' | grep -viE 'token|secret|password' || true
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history/tags so the git context and detection are accurate
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Git context
        run: |
          echo "in_work_tree : $(git rev-parse --is-inside-work-tree 2>/dev/null || echo no)"
          echo "head_sha     : $(git rev-parse HEAD 2>/dev/null)"
          echo "branch_symref: $(git symbolic-ref --short HEAD 2>/dev/null || echo '(detached)')"
          echo "parents      : $(git show -s --format='%P' HEAD 2>/dev/null)"
          echo "parent_count : $(git show -s --format='%P' HEAD 2>/dev/null | wc -w)"
          echo "subject      : $(git log -1 --format='%s' 2>/dev/null)"
          echo "committer    : $(git log -1 --format='%cn <%ce>' 2>/dev/null)"
          echo "author       : $(git log -1 --format='%an <%ae>' 2>/dev/null)"
          echo "--- recent history (oneline) ---"
          git log --oneline --decorate -5 2>/dev/null || true
      - name: What contextinfo detects
        run: |
          echo '----- contextinfo --format=json -----'
          go run ./cmd/contextinfo --format=json
          echo '----- contextinfo --format=envvar -----'
          go run ./cmd/contextinfo --format=envvar
